[versions]
amqpClient = "5.29.0"
assertj = "3.27.7"
clazzGraph = "4.8.184"
guava = "33.5.0-jre"
guice = "7.0.0"
hikariCP = "7.0.2"
jackson = "3.1.0"
jakartaCdiApi = "5.0.0-M1"
jakartaInjectApi = "2.0.1"
jedis = "7.4.0"
jettyServer = "12.1.7"
junit = "5.10.2"
logback = "1.5.32"
