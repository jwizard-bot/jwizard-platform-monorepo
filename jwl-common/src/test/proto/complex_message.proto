syntax = "proto3";

package xyz.jwizard.jwl.common.serialization.protobuf;

import "test_message.proto";

option java_package = "xyz.jwizard.jwl.common.serialization.protobuf";
option java_outer_classname = "ComplexMessageProto";
option java_multiple_files = true;

message ComplexMessage {
    string description = 1;
    TestMessage core_data = 2;
}
